<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>演示文稿标题</title>
<style>
  :root {
    --bg-color: #FAF9F6;
    --text-color: #1A1A1A;
    --accent-color: #FF6B00;
    --sub-text: #666666;
    --border-color: #eee;
    --banner-bg: #F2F0EB;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: #000; color: var(--text-color);
    display: flex; align-items: center; justify-content: center;
  }

  /* 3:2 固定比例画面 */
  .stage {
    width: 100vw; height: calc(100vw * 2 / 3);
    max-height: 100vh; max-width: calc(100vh * 3 / 2);
    position: relative; background: var(--bg-color); overflow: hidden;
  }
  .deck { position: absolute; inset: 0; }
  .slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; padding: 28px 40px 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
    overflow: hidden;
  }
  .slide.active { opacity: 1; pointer-events: auto; }

  /* 逐步揭示 */
  .step { opacity: 0; transform: translateY(18px); transition: opacity 0.4s ease, transform 0.4s ease; }
  .step.visible { opacity: 1; transform: translateY(0); }

  /* 封面 */
  .cover { text-align: center; gap: 28px; justify-content: center !important; }
  .cover h1 { font-size: clamp(2.4rem, 4.5vw, 3.6rem); font-weight: 800; line-height: 1.3; }
  .cover h1 .accent { color: var(--accent-color); }
  .cover .subtitle { color: var(--sub-text); font-size: 1.25rem; margin-top: 8px; }
  .cover .tags { display: flex; gap: 20px; justify-content: center; margin-top: 12px; }
  .cover .tag { padding: 14px 36px; border-radius: 8px; background: var(--banner-bg); font-size: 1.35rem; font-weight: 600; border: 1px solid var(--border-color); }

  /* 内容页标题 */
  .header { text-align: center; width: 100%; margin-bottom: 10px; flex-shrink: 0; }
  .header .num { font-size: 1.1rem; color: var(--accent-color); font-weight: 700; letter-spacing: 0.08em; }
  .header .title { font-size: clamp(1.8rem, 3.2vw, 2.4rem); font-weight: 700; margin-top: 2px; }

  /* 提示词框 */
  .prompt { background: var(--banner-bg); border-radius: 10px; padding: 14px 22px; max-width: 960px; width: 100%; margin-bottom: 10px; border-left: 4px solid var(--accent-color); flex-shrink: 0; }
  .prompt p { font-size: 1.05rem; line-height: 1.5; white-space: pre-wrap; }
  .prompt .label { font-size: 0.9rem; color: var(--accent-color); font-weight: 700; margin-bottom: 4px; }

  /* 图片区 */
  .imgs { display: flex; gap: 12px; justify-content: center; align-items: flex-start; max-width: 1100px; width: 100%; flex: 1; min-height: 0; }
  .img-card { flex: 1; max-width: 340px; display: flex; flex-direction: column; align-items: center; gap: 4px; min-height: 0; }
  .img-card img { width: 100%; max-height: 38vh; object-fit: contain; border-radius: 8px; border: 1px solid var(--border-color); background: #fff; }
  .img-card .name { font-size: 1rem; font-weight: 600; color: var(--sub-text); padding: 4px 14px; background: var(--banner-bg); border-radius: 4px; }

  /* 分数栏 */
  .scores { display: flex; gap: 16px; justify-content: center; margin-top: 10px; flex-shrink: 0; }
  .sc { text-align: center; padding: 8px 22px; border-radius: 8px; background: var(--banner-bg); min-width: 160px; }
  .sc .m { font-size: 0.95rem; color: var(--sub-text); font-weight: 600; }
  .sc .v { font-size: 1.8rem; font-weight: 800; margin-top: 2px; }
  .sc.win .v { color: var(--accent-color); }

  /* 进度条 */
  .progress { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent-color); transition: width 0.4s ease; z-index: 100; }

  /* 隐藏录屏无关元素 */
  .page-ind, .key-hint { display: none; }
</style>
</head>
<body>
<div class="stage">
  <div class="deck" id="deck">

    <!-- 封面 -->
    <div class="slide cover active">
      <h1>演示标题<br><span class="accent">副标题</span></h1>
      <div class="tags">
        <span class="tag">标签1</span>
        <span class="tag">标签2</span>
      </div>
      <p class="subtitle">简要描述</p>
    </div>

    <!-- 内容页示例 -->
    <div class="slide">
      <div class="header">
        <div class="num">ROUND 01</div>
        <div class="title">页面标题</div>
      </div>
      <div class="prompt step">
        <div class="label">PROMPT</div>
        <p>提示词或说明文字</p>
      </div>
      <div class="imgs">
        <div class="img-card step">
          <img src="images/example.jpg" alt="">
          <div class="name">标签A</div>
        </div>
        <div class="img-card step">
          <img src="images/example2.jpg" alt="">
          <div class="name">标签B</div>
        </div>
      </div>
      <div class="scores step">
        <div class="sc win"><div class="m">标签A</div><div class="v">9.50</div></div>
        <div class="sc"><div class="m">标签B</div><div class="v">7.20</div></div>
      </div>
    </div>

  </div>
  <div class="progress" id="progress"></div>
</div>

<script>
const slides = document.querySelectorAll('.slide');
const progressBar = document.getElementById('progress');
let cur = 0, step = 0;
const stepCounts = [];

slides.forEach(s => stepCounts.push(s.querySelectorAll('.step').length));

function update() {
  slides.forEach((s, i) => s.classList.toggle('active', i === cur));
  const active = slides[cur];
  active.querySelectorAll('.step').forEach((el, i) => el.classList.toggle('visible', i < step));
  progressBar.style.width = ((cur / (slides.length - 1)) * 100) + '%';
}

function next() {
  if (step < stepCounts[cur]) { step++; update(); }
  else if (cur < slides.length - 1) { cur++; step = 0; update(); }
}

function prev() {
  if (step > 0) { step--; update(); }
  else if (cur > 0) { cur--; step = stepCounts[cur]; update(); }
}

document.addEventListener('keydown', e => {
  if (['ArrowRight', ' ', 'Enter'].includes(e.key)) { e.preventDefault(); next(); }
  else if (['ArrowLeft', 'Backspace'].includes(e.key)) { e.preventDefault(); prev(); }
  else if (e.key === 'Home') { cur = 0; step = 0; update(); }
  else if (e.key === 'End') { cur = slides.length - 1; step = stepCounts[cur]; update(); }
});

update();
</script>
</body>
</html>
